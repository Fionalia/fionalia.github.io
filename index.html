<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="phaser.js"></script>
</head>
<body>
    <script>
        var config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('sky', 'assets/sky.png');
    }

    function create ()
    {
        this.add.image(400, 300, 'sky');
    }
    function update()
    {
        return 0;
    }
    </script>
</body>
</html>
